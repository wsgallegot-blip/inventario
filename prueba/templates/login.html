<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/eslilos_login.css') }}">
</head>
<body>

<header>
    <div class="logo">
        Sistema de Inventario
    </div>


</header>

<div class="container">
    <div class="login-box">
        <h2>Iniciar Sesión</h2>

        <form method="POST" action="/">

            <div class="input-group">
                <label>Usuario</label>
                <input
                    type="text"
                    name="username"
                    placeholder="Ingresa tu usuario"
                    required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    required>
            </div>

            <button type="submit" class="btn btn-login">
                Ingresar
            </button>

        </form>

        {% if error %}
            <p style="color:red; margin-top:10px;">
                {{ error }}
            </p>
        {% endif %}
    </div>
</div>

</body>
</html>
